name: Replay Protection
description: Add replay cache / nonce protection for webhook receiver
title: "Add replay protection cache for webhook receiver"
labels: ["type:hardening", "area:security", "priority:high"]
body:
  - type: textarea
    id: goal
    attributes:
      label: Goal
      description: What security risk are we reducing?
      placeholder: Prevent replayed webhook requests within timestamp skew window.
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: Concrete implementation tasks
      placeholder: |
        - Add TTL cache for seen request nonce/idempotency
        - Reject duplicates with clear status code
        - Add tests for accept/reject/expiry
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance Criteria
      placeholder: |
        - First request accepted
        - Duplicate request rejected
        - Expired nonce accepted after TTL
    validations:
      required: true
